name: Build & Release

on:
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-15
    outputs:
      signature: ${{ steps.sign.outputs.signature }}
      size: ${{ steps.sign.outputs.size }}
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$CERT_P12_BASE64" ]; then
            echo "No cert secret — skipping import, will use ad-hoc signing"
            exit 0
          fi
          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain

      - name: Build macOS
        run: flutter build macos --release

      - name: Sign app
        run: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          echo "Signing $APP"
          codesign --deep --force --sign "HQFin" "$APP" || \
          codesign --deep --force --sign "-" "$APP"

      - name: Package as zip
        run: |
          cd build/macos/Build/Products/Release
          APP=$(find . -name "*.app" -maxdepth 1 | head -1 | sed 's|./||')
          zip -r --symlinks hqfin-macos.zip "$APP"

      - name: Sign update with Sparkle EdDSA key
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "No Sparkle key — skipping EdDSA signature"
            echo "signature=" >> $GITHUB_OUTPUT
            echo "size=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_private.pem
          SIGNATURE=$(openssl pkeyutl -sign -inkey /tmp/sparkle_private.pem \
            -rawin -in build/macos/Build/Products/Release/hqfin-macos.zip \
            | base64 | tr -d '\n')
          SIZE=$(stat -f%z build/macos/Build/Products/Release/hqfin-macos.zip)
          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: build/macos/Build/Products/Release/hqfin-macos.zip

  # ── iOS ────────────────────────────────────────────────────────────────────
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Patch better_native_video_player (npLog undefined in Xcode 26)
        run: |
          find ~/.pub-cache -path "*/better_native_video_player*/*.swift" \
            -exec sed -i '' 's/npLog(/print(/g' {} +

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r hqfin.ipa Payload

      - uses: actions/upload-artifact@v7
        with:
          name: ios
          path: build/ios/iphoneos/hqfin.ipa

  # ── Android ────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: build/app/outputs/flutter-apk/app-release.apk

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath hqfin-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: hqfin-windows.zip

  # ── Release + appcast ──────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-ios, build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION%+*}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: HQFin ${{ steps.version.outputs.tag }}
          make_latest: true
          fail_on_unmatched_files: false
          files: |
            artifacts/macos/hqfin-macos.zip
            artifacts/ios/hqfin.ipa
            artifacts/android/app-release.apk
            artifacts/windows/hqfin-windows.zip

      - name: Update appcast.xml
        env:
          SPARKLE_SIGNATURE: ${{ needs.build-macos.outputs.signature }}
          MACOS_SIZE: ${{ needs.build-macos.outputs.size }}
          VERSION: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${VERSION}/hqfin-macos.zip"
          {
            echo '<?xml version="1.0" encoding="utf-8"?>'
            echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">'
            echo '  <channel>'
            echo "    <title>HQFin</title>"
            echo "    <item>"
            echo "      <title>HQFin ${VERSION}</title>"
            echo "      <pubDate>${DATE}</pubDate>"
            echo "      <sparkle:version>${VERSION#v}</sparkle:version>"
            echo "      <sparkle:shortVersionString>${VERSION#v}</sparkle:shortVersionString>"
            echo "      <sparkle:minimumSystemVersion>12.0</sparkle:minimumSystemVersion>"
            echo "      <enclosure"
            echo "        url=\"${DOWNLOAD_URL}\""
            echo "        sparkle:version=\"${VERSION#v}\""
            echo "        sparkle:edSignature=\"${SPARKLE_SIGNATURE}\""
            echo "        length=\"${MACOS_SIZE}\""
            echo "        type=\"application/octet-stream\"/>"
            echo "    </item>"
            echo "  </channel>"
            echo '</rss>'
          } > appcast.xml

      - name: Commit updated appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add appcast.xml
          git diff --staged --quiet || git commit -m "Update appcast to ${{ steps.version.outputs.tag }} [skip ci]"
          git push
